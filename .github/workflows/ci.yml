name: CI

on:
  push:
    branches: [trunk, trunk-dev]
  pull_request:
    branches: [trunk, trunk-dev]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2.7.8
      - name: Check formatting
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: Test (${{ matrix.os }})
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: Free disk space (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.7.8
        continue-on-error: true
      - name: Run tests
        run: cargo test --workspace
      - name: Run Docker-dependent tests
        if: runner.os == 'Linux'
        run: |
          cargo test -p autumn-web --test db_hooks_lifecycle -- --ignored
          cargo test -p autumn-web --all-features --test feature_flags_pg_integration -- --ignored

  coverage:
    name: Coverage
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2.7.8
      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@cargo-llvm-cov
      - name: Generate coverage
        run: |
          cargo llvm-cov clean --workspace
          cargo llvm-cov --workspace --all-features --no-report
          cargo llvm-cov --no-report -p autumn-web --all-features \
            --test db_hooks_lifecycle -- --ignored
          cargo llvm-cov --no-report -p autumn-web --all-features \
            --test feature_flags_pg_integration -- --ignored
          cargo llvm-cov report --lcov --output-path lcov.info
      - name: Upload to Codecov
        uses: codecov/codecov-action@v6
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: lcov.info
          fail_ci_if_error: false

  msrv:
    name: MSRV (1.88.0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.88.0
      - uses: Swatinem/rust-cache@v2.7.8
      - name: Check MSRV alignment
        run: ./scripts/check-msrv.sh
      - name: Check MSRV compiles
        run: cargo check --workspace
