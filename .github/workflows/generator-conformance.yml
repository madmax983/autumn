name: Generator Conformance

# Compile-and-serve gates for `autumn new` / `autumn generate` output.
#
# These gates run the #[ignore]d tests in autumn-cli/tests/ that scaffold a
# fresh project, compile it against the in-tree autumn-web crate via the
# workspace [patch.crates-io] override, and (for the e2e jobs) boot the
# generated server and assert HTTP responses. They are CI-gated, not
# abandoned — see CONTRIBUTING.md for details.
#
# Path-scoped so the gate only fires when a generator template, generator
# source file, or the autumn-web public surface changes. A weekly scheduled
# run catches breakage introduced through transitive dependency updates.

on:
  push:
    branches: [trunk, trunk-dev]
    paths:
      - ".github/workflows/generator-conformance.yml"
      - "autumn-cli/src/generate/**"
      - "autumn-cli/src/templates/**"
      - "autumn-cli/src/new.rs"
      - "autumn-cli/src/main.rs"
      - "autumn-cli/src/migrate.rs"
      - "autumn-cli/Cargo.toml"
      - "autumn-cli/tests/e2e.rs"
      - "autumn-cli/tests/generate.rs"
      - "autumn/src/**"
      - "autumn/Cargo.toml"
      - "autumn-macros/**"
      - "Cargo.toml"
  pull_request:
    branches: [trunk, trunk-dev]
    paths:
      - ".github/workflows/generator-conformance.yml"
      - "autumn-cli/src/generate/**"
      - "autumn-cli/src/templates/**"
      - "autumn-cli/src/new.rs"
      - "autumn-cli/src/main.rs"
      - "autumn-cli/src/migrate.rs"
      - "autumn-cli/Cargo.toml"
      - "autumn-cli/tests/e2e.rs"
      - "autumn-cli/tests/generate.rs"
      - "autumn/src/**"
      - "autumn/Cargo.toml"
      - "autumn-macros/**"
      - "Cargo.toml"
  schedule:
    # Weekly on Monday at 04:00 UTC — catches rot from transitive dep updates
    # that do not touch the path-filtered files above.
    - cron: "0 4 * * 1"
  workflow_dispatch: {}

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── Non-Postgres compile/serve gates ────────────────────────────────────────
  #
  # Runs:
  #   generated_project_compiles_runs_and_serves  (e2e.rs)
  #   generated_scaffold_cargo_checks             (generate.rs)
  #   generated_scaffold_config_cargo_checks      (generate.rs)
  #   generated_auth_totp_cargo_checks            (generate.rs)
  #   generated_job_cargo_checks                  (generate.rs)
  #
  # Each test scaffolds a project, patches Cargo.toml to point at the local
  # autumn-web crate, and runs `cargo build` / `cargo check`. Failures include
  # the full compiler stdout+stderr so the breakage is diagnosable from the
  # CI summary without fetching build logs manually.
  compile-and-serve:
    name: Compile-and-serve gates (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, "1.88.0"]
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2.7.8
        continue-on-error: true

      - name: generated_project_compiles_runs_and_serves
        run: |
          cargo test -p autumn-cli --test e2e \
            generated_project_compiles_runs_and_serves -- --ignored --exact

      - name: generated_scaffold_cargo_checks
        run: |
          cargo test -p autumn-cli --test generate \
            generated_scaffold_cargo_checks -- --ignored --exact

      - name: generated_scaffold_config_cargo_checks
        run: |
          cargo test -p autumn-cli --test generate \
            generated_scaffold_config_cargo_checks -- --ignored --exact

      - name: Pre-fetch TOTP deps (absent from workspace Cargo.lock)
        # totp-rs is not a workspace dep, so it is absent from the workspace
        # Cargo.lock and not covered by rust-cache. Pre-fetching it here
        # ensures the cargo registry cache is warm before the auth gate runs,
        # avoiding a full download on every CI run.
        run: |
          tmp=$(mktemp -d)
          cat > "$tmp/Cargo.toml" <<'TOML'
          [package]
          name    = "totp-prefetch"
          version = "0.0.0"
          edition = "2024"
          [dependencies]
          totp-rs = { version = "5", features = ["qr", "gen_secret", "otpauth"] }
          TOML
          mkdir -p "$tmp/src"
          printf 'fn main() {}' > "$tmp/src/main.rs"
          cargo fetch --manifest-path "$tmp/Cargo.toml"

      - name: generated_auth_totp_cargo_checks
        run: |
          cargo test -p autumn-cli --test generate \
            generated_auth_totp_cargo_checks -- --ignored --exact

      - name: generated_job_cargo_checks
        run: |
          cargo test -p autumn-cli --test generate \
            generated_job_cargo_checks -- --ignored --exact

  # ── Postgres e2e gate ────────────────────────────────────────────────────────
  #
  # Runs:
  #   generated_scaffold_serves_posts_index_and_json_api  (generate.rs)
  #
  # Scaffolds a Post resource, runs Diesel migrations against a Postgres
  # testcontainer, builds the generated app, boots it, and asserts the HTML
  # index page and JSON API route both respond with 200. Docker is required
  # (available on ubuntu-latest). `autumn migrate` shells out to the `diesel`
  # CLI, which must be installed before the test runs. Failure surfaces the
  # full `cargo build` stdout+stderr captured by the test assertions.
  scaffold-postgres:
    name: Scaffold Postgres e2e gate (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        toolchain: [stable, "1.88.0"]
    steps:
      - uses: actions/checkout@v7

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android \
                      /opt/ghc /opt/hostedtoolcache/CodeQL
          df -h

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}

      - uses: Swatinem/rust-cache@v2.7.8
        continue-on-error: true

      - name: Install diesel_cli
        run: cargo install diesel_cli --version "=2.2.0" --no-default-features --features postgres --locked

      - name: generated_scaffold_serves_posts_index_and_json_api
        run: |
          cargo test -p autumn-cli --test generate \
            generated_scaffold_serves_posts_index_and_json_api -- --ignored --exact
