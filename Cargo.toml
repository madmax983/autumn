[workspace]
members = ["autumn", "autumn-macros", "autumn-cli", "examples/hello", "examples/todo-app"]
resolver = "3"

[workspace.package]
edition = "2024"
version = "0.1.0"
license = "MIT OR Apache-2.0"
repository = "https://github.com/madmax983/autumn"

[workspace.dependencies]
# Runtime
axum = { version = "0.8", features = ["macros"] }
diesel = { version = "2", features = ["sqlite"] }
diesel-async = { version = "0.8", features = ["deadpool", "postgres"] }
http = "1"
libsqlite3-sys = { version = "0.36", features = ["bundled"] }
tokio = { version = "1", features = ["full"] }
serde = { version = "1", features = ["derive"] }
thiserror = "2"
maud = { version = "0.27", features = ["axum"] }
toml = "0.8"
tower = "0.5"
tower-http = { version = "0.6", features = ["fs", "trace"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["json", "env-filter"] }

# Proc macro
syn = { version = "2", features = ["full"] }
quote = "1"
proc-macro2 = "1"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }
nursery = { level = "warn", priority = -1 }
