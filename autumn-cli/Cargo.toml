[package]
name = "autumn-cli"
description = "CLI tool for the Autumn web framework"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true

[[bin]]
name = "autumn"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
thiserror = "2"

[dev-dependencies]
tempfile = "3"

[lints]
workspace = true
