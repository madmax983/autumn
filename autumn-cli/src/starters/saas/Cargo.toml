[package]
name = "{{crate_name}}"
version = "0.1.0"
edition = "2024"

[dependencies]
autumn-web = { version = "{{autumn_version}}", features = ["maud", "htmx", "db"] }
diesel = { version = "2", features = ["postgres", "chrono"] }
diesel-async = { version = "0.8", features = ["postgres"] }
pq-sys = { version = "0.7", features = ["bundled_without_openssl"] }
diesel_migrations = "2"
maud = { version = "0.27", features = ["axum"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
chrono = { version = "0.4", features = ["serde"] }
validator = { version = "0.20", features = ["derive"] }

[dev-dependencies]
autumn-web = { version = "{{autumn_version}}", features = ["test-support"] }
tokio = { version = "1", features = ["rt", "macros"] }

[workspace]
