[package]
name = "autumn-web"
description = "An opinionated, convention-over-configuration web framework for Rust"
edition.workspace = true
version.workspace = true
license.workspace = true
repository.workspace = true

[features]
default = ["maud", "htmx", "tailwind", "db"]
maud = ["dep:maud"]
htmx = []
tailwind = []
db = ["dep:diesel", "dep:diesel-async", "dep:libsqlite3-sys"]

[dependencies]
autumn-macros = { version = "0.1.0", path = "../autumn-macros" }
axum.workspace = true
diesel = { workspace = true, optional = true }
diesel-async = { workspace = true, optional = true }
http.workspace = true
libsqlite3-sys = { workspace = true, optional = true }
maud = { workspace = true, optional = true }
pin-project-lite = "0.2"
serde.workspace = true
serde_json = "1"
thiserror.workspace = true
tokio.workspace = true
toml.workspace = true
tower.workspace = true
tower-http.workspace = true
tracing.workspace = true
tracing-subscriber.workspace = true
tokio-cron-scheduler.workspace = true
validator.workspace = true
uuid = { version = "1", features = ["v4"] }

[dev-dependencies]
http.workspace = true
serde_json = "1"
tempfile = "3"
tokio.workspace = true
tower.workspace = true
trybuild = "1"

[lints]
workspace = true
