<!DOCTYPE html>
<html lang="en">
<head><meta charset="utf-8"><title>Posts</title></head>
<body>
<h1>Posts</h1>
<ul>
{% for post in posts %}
  <li>
    <a href="/posts/{{ post.id }}">{{ post.title }}</a>
    &mdash; {{ post.author }}
    {% if not post.published %}<em>[draft]</em>{% endif %}
  </li>
{% endfor %}
</ul>
</body>
</html>
