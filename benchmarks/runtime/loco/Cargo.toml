[package]
name = "bench-loco"
version = "0.1.0"
edition = "2021"
publish = false

[[bin]]
name = "bench-loco"
path = "src/main.rs"

[dependencies]
loco-rs = { version = "0.14", features = ["with-db"] }
sea-orm = { version = "1", features = [
    "sqlx-postgres", "runtime-tokio-rustls", "macros", "with-chrono"
] }
sea-orm-migration = { version = "1" }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
axum = "0.7"
async-trait = "0.1"
tracing = "0.1"

[lints.rust]
unsafe_code = "forbid"
