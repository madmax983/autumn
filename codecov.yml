coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 2%
    patch:
      default:
        target: 90%
        threshold: 5%

comment:
  layout: reach, diff, flags, components
  behavior: default
  require_changes: false

ignore:
  - "examples/**"
  - "autumn-cli/src/build.rs"   # CLI subprocess orchestration — untestable in unit tests
  - "autumn-cli/src/dev.rs"     # CLI subprocess orchestration — untestable in unit tests
  - "autumn-cli/src/cold_start_driver.rs"  # Cold-start onboarding measurement driver: scaffold + cold cargo build + server spawn + HTTP poll — subprocess/TCP/filesystem orchestration, untestable in unit tests (like dev.rs/build.rs). Pure budget/report logic lives in dev_loop_bench.rs and is unit-tested there.
  - "autumn-cli/src/scaling_driver.rs"   # Macro-scaling measurement driver: synthetic app scaffold + warm/incremental cargo build timing — subprocess/filesystem/timing orchestration, untestable in unit tests (same pattern as cold_start_driver.rs). Pure budget/report/generator logic lives in dev_loop_scaling.rs and is unit-tested there.
  - "autumn-cli/src/doctor.rs"  # Mix of pure-function unit tests and IO-bound orchestration; IO paths (process spawning, TCP, filesystem) excluded like build.rs/dev.rs
  - "autumn-cli/src/config.rs"  # psql subprocess orchestration (run_set/unset/list/history/check_psql) — untestable in unit tests; URL-resolution logic is covered in separate tests
  - "autumn-cli/src/flags.rs"  # psql subprocess orchestration (enable/disable/set-rollout/allow) — same pattern as config.rs
  - "autumn-cli/src/shard.rs"  # psql subprocess orchestration (move-slot \copy/verify/delete) — untestable in unit tests; SQL-building, identifier-quoting and URL-resolution logic are covered in separate tests
  - "autumn-cli/src/db.rs"     # DB lifecycle (create/drop/reset): Postgres connection + subprocess orchestration — untestable in unit tests; URL parsing, identifier quoting, profile guards and error formatting are covered in separate tests, end-to-end paths in Docker-gated tests/db.rs
  - "benchmarks/runtime/gate/src/main.rs"  # CLI shell: arg parsing + file IO + process::exit — untestable in unit tests; all pure gate logic (parse_budgets/parse_k6_summary/median_p99/check_gate/format_*) lives in lib.rs and is fully unit-tested there
  - "autumn-cli/src/templates/**"
  - "autumn-cache-redis/**"     # Requires a live Redis server (testcontainers); all tests are #[ignore] for cross-platform CI
  - "example-e2e/**"    # Spawns real example binaries against testcontainers Postgres + headless Chromium (issue #1192); all tests are #[ignore] for cross-platform CI, same pattern as autumn-cache-redis
  - "autumn/src/system_test.rs"  # SystemTest/Page/SystemTestRunner drive a live headless-Chromium browser over CDP — untestable without a real browser; all such tests are #[ignore] for cross-platform CI, same pattern as autumn-cache-redis
  - "**/*_test.rs"
  - "**/tests/**"
