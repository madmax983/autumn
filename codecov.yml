coverage:
  status:
    project:
      default:
        target: 85%
        threshold: 2%
    patch:
      default:
        target: 90%
        threshold: 5%

comment:
  layout: reach, diff, flags, components
  behavior: default
  require_changes: false

ignore:
  - "examples/**"
  - "autumn-cli/src/build.rs"  # CLI subprocess orchestration — untestable in unit tests
  - "autumn-cli/src/load.rs"   # Terminal UI blocking loops — untestable in unit tests
  - "autumn-cli/src/templates/**"
  - "**/*_test.rs"
  - "**/tests/**"
