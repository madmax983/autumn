[server]
port = 3000

# In dev, the framework defaults `[storage]` to a local-disk backend
# rooted at `target/blobs/`. Uncomment to override.
[storage]
backend = "local"
default_provider = "default"

[storage.local]
root = "target/blobs"
mount_path = "/_blobs"
default_url_expiry_secs = 900

# Production setup (commented):
#
# [profile.prod.storage]
# backend = "s3"
# default_provider = "default"
#
# [profile.prod.storage.s3]
# bucket = "my-app-uploads"
# region = "us-east-1"
# # Custom endpoint for non-AWS S3-compatible providers (R2, MinIO, ...)
# # endpoint = "https://<account>.r2.cloudflarestorage.com"
# access_key_id_env = "AWS_ACCESS_KEY_ID"
# secret_access_key_env = "AWS_SECRET_ACCESS_KEY"
# force_path_style = false
