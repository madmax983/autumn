# Profile overrides for the docker-compose stack: service hostnames
# instead of localhost ports, and bind all interfaces so nginx can reach
# the web replicas across the container network.

[server]
host = "0.0.0.0"
port = 3000

[database]
primary_url = "postgres://autumn:autumn@postgres-control:5432/bookmarks_control"

[[database.shards]]
name = "shard0"
primary_url = "postgres://autumn:autumn@postgres-shard-0:5432/bookmarks_shard0"
slots = ["0-31"]

[[database.shards]]
name = "shard1"
primary_url = "postgres://autumn:autumn@postgres-shard-1:5432/bookmarks_shard1"
slots = ["32-63"]
