[package]
name = "todo-app"
version = "0.1.0"
edition = "2024"
publish = false
default-run = "todo-app"

[[bin]]
name = "seed"
path = "src/bin/seed.rs"

[features]
# Enable headless-browser system tests. Requires Chromium on the host.
#   cargo test -p todo-app --features system-tests -- --include-ignored
system-tests = ["autumn-web/system-tests"]

[dependencies]
autumn-web = { path = "../../autumn", features = ["seed", "mcp"] }
chrono = { version = "0.4", features = ["serde"] }
futures = "0.3"
http = "1"
diesel = { version = "2", features = ["postgres", "chrono"] }
diesel-async = { version = "0.9", features = ["postgres"] }
pq-sys = { version = "0.7", features = ["bundled_without_openssl"] }
diesel_migrations = "2"
maud = { version = "0.27", features = ["axum"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
validator = { version = "0.20", features = ["derive"] }
url = "2.5.8"

[dev-dependencies]
# Enables TestDb (shared Postgres testcontainer) for integration tests.
autumn-web = { path = "../../autumn", features = ["test-support"] }
serde_json = "1"

[[test]]
name = "todo_htmx_flow"
path = "tests/system/todo_htmx_flow.rs"

[lints.rust]
unsafe_code = "forbid"
