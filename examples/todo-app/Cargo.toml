[package]
name = "todo-app"
version = "0.1.0"
edition = "2024"
publish = false

[[bin]]
name = "seed"
path = "src/bin/seed.rs"

[dependencies]
autumn-web = { path = "../../autumn", features = ["seed"] }
chrono = { version = "0.4", features = ["serde"] }
diesel = { version = "2", features = ["postgres", "chrono"] }
diesel-async = { version = "0.8", features = ["postgres"] }
pq-sys = { version = "0.7", features = ["bundled_without_openssl"] }
diesel_migrations = "2"
maud = { version = "0.27", features = ["axum"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
tokio = { version = "1", features = ["full"] }
validator = { version = "0.20", features = ["derive"] }

[dev-dependencies]
# Enables TestDb (shared Postgres testcontainer) for integration tests.
autumn-web = { path = "../../autumn", features = ["test-support"] }
serde_json = "1"

[lints.rust]
unsafe_code = "forbid"
