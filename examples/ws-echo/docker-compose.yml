x-ws-echo: &ws-echo
  build:
    context: ../..
    dockerfile: examples/ws-echo/Dockerfile
  environment:
    AUTUMN_PROFILE: docker
    AUTUMN_SERVER__HOST: 0.0.0.0
    AUTUMN_SERVER__PORT: 3000
    AUTUMN_CHANNELS__BACKEND: redis
    AUTUMN_CHANNELS__CAPACITY: 32
    AUTUMN_CHANNELS__REDIS__URL: redis://redis:6379/
    AUTUMN_CHANNELS__REDIS__KEY_PREFIX: autumn:ws-echo
  depends_on:
    redis:
      condition: service_healthy
  healthcheck:
    test: ["CMD", "curl", "-fsS", "http://127.0.0.1:3000/actuator/health"]
    interval: 2s
    timeout: 2s
    retries: 30
    start_period: 5s

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 2s
      retries: 30

  app1:
    <<: *ws-echo
    ports:
      - "3001:3000"

  app2:
    <<: *ws-echo
    ports:
      - "3002:3000"

  smoke:
    image: curlimages/curl:8.10.1
    depends_on:
      app1:
        condition: service_healthy
      app2:
        condition: service_healthy
    volumes:
      - ./docker/redis-smoke:/smoke/redis-smoke:ro
    command: ["/bin/sh", "/smoke/redis-smoke"]
